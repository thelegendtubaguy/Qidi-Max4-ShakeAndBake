[printer]
kinematics: corexy
max_velocity: 600
max_accel: 20000
max_z_velocity: 20
max_z_accel: 500
square_corner_velocity: 5

[stepper_x]
position_min: 0
position_max: 325

[stepper_y]
position_min: 0
position_max: 325

[resonance_tester]
accel_chip: lis2dw
accel_per_hz: 75
max_smoothing: 0.12
probe_points: 195,195,10

[lis2dw]
cs_pin: PA4
spi_bus: spi1
spi_speed: 5000000
axes_map: y,z,-x

[input_shaper]
shaper_type_x: mzv
shaper_freq_x: 47.4
shaper_type_y: ei
shaper_freq_y: 39.2

[closed_loop x]
run_current: 1.20
hold_current: 0.60
home_current: 0.80
microsteps: 16

[closed_loop y]
run_current: 1.25
hold_current: 0.65
home_current: 0.85
microsteps: 16
